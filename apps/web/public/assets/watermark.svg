<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Faint board emblem used as a hero watermark (rendered at low opacity). -->
  <g stroke="#d8cba8" stroke-width="2.5" stroke-linecap="round">
    <line x1="80" y1="80" x2="320" y2="80"/>
    <line x1="80" y1="120" x2="320" y2="120"/>
    <line x1="80" y1="160" x2="320" y2="160"/>
    <line x1="80" y1="200" x2="320" y2="200"/>
    <line x1="80" y1="240" x2="320" y2="240"/>
    <line x1="80" y1="280" x2="320" y2="280"/>
    <line x1="80" y1="320" x2="320" y2="320"/>
    <line x1="80" y1="80" x2="80" y2="320"/>
    <line x1="120" y1="80" x2="120" y2="320"/>
    <line x1="160" y1="80" x2="160" y2="320"/>
    <line x1="200" y1="80" x2="200" y2="320"/>
    <line x1="240" y1="80" x2="240" y2="320"/>
    <line x1="280" y1="80" x2="280" y2="320"/>
    <line x1="320" y1="80" x2="320" y2="320"/>
  </g>
  <!-- A winning diagonal of five stones. -->
  <g fill="#d8cba8">
    <circle cx="120" cy="280" r="17"/>
    <circle cx="160" cy="240" r="17"/>
    <circle cx="200" cy="200" r="17"/>
    <circle cx="240" cy="160" r="17"/>
    <circle cx="280" cy="120" r="17"/>
  </g>
</svg>
